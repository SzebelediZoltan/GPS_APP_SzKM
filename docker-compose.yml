version: "3.9"

services:
  frontend:
    image: ghcr.io/szebeledizoltan/gpass-frontend:latest
    container_name: vite-frontend
    restart: always
    # Itt nem kell port, mert az NPM majd eléri a belső hálózaton
    networks:
      - proxy

  backend:
    image: ghcr.io/szebeledizoltan/gpass-backend:latest
    container_name: gpass-backend
    restart: always
    env_file:
      - .env  # Ezt a fájlt kézzel hozd létre a VPS-en a titkokkal!
    expose:
      - "4000"
    depends_on:
      - mysql
    networks:
      - proxy

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"   # HTTP
      - "81:81"   # Ide lépsz be a böngészőben (Admin felület)
      - "443:443" # HTTPS
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - proxy

  mysql:
    image: mysql:8.0
    container_name: gpass-mysql
    restart: always
    environment:
      MYSQL_DATABASE: gpass_db
      MYSQL_USER: gpass
      MYSQL_PASSWORD: geoloc
      MYSQL_ROOT_PASSWORD: georoot
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - proxy

volumes:
  mysql_data:

networks:
  proxy:
    driver: bridge