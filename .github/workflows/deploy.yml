name: Build and Push to GHCR

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # BACKEND - Fixen kisbetűs névvel
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./gpass-app-backend
          push: true
          tags: ghcr.io/szebeledizoltan/gpass-backend:latest

      # FRONTEND - Fixen kisbetűs névvel
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./gpass-app-frontend
          push: true
          tags: ghcr.io/szebeledizoltan/gpass-frontend:latest
          build-args: |
            VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}